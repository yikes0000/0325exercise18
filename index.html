<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heading Style</title>

<style>
body {
  background: #eee;
  font-family: serif;
}

/* Heading 1 */
.h1 {
  font-size: 48px;
  font-weight: bold;
  display: inline-block;
  padding-top: 10px;

  /* 上方黑線 */
  border-top: 6px solid black;

  /* 黑線的紅色陰影 */
  box-shadow: 0 -4px 0 red;

  /* 文字紅色陰影 */
  text-shadow: 2px 2px red;
}

/* Heading 2 */
.h2 {
  font-size: 36px;
  font-style: italic;
  padding: 10px;
  background: white;

  border: 3px solid black;

  /* 黃色外發光（陰影） */
  box-shadow: 0 0 0 6px yellow;
  
  margin: 40px 0;
}

/* Heading 3 */
.h3 {
  font-size: 32px;
  text-align: right;
  text-decoration: underline;
}
</style>

</head>

<body>

<div class="h1">This is heading 1</div>

<div class="h2">This is heading 2</div>

<div class="h3">This is heading 3</div>

</body>
</html>
