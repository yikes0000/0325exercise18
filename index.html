<!DOCTYPE html>
<html>
<head>
<style>
  h1 {
    border-top: 3px solid black; 
    padding-top: 10px;           
    display: inline-block;       
    width: 100%;                 
  }

  h2 {
    border: 2px solid yellow;   
    font-style: italic;          
    padding: 5px;
  }


  h3 {
    text-align: right;           
    text-decoration: underline;  
  }
</style>
</head>
<body>

  <h1>This is heading 1</h1>
  <h2>This is heading 2</h2>
  <h3>This is heading 3</h3>

</body>
</html>
