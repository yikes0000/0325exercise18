<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heading Layout</title>

<style>
body {
  background: #eee;
  font-family: serif;
}

/* Heading 1 */
.h1 {
  font-size: 48px;
  font-weight: bold;
  border-top: 6px solid black;
  display: inline-block;
  padding-top: 10px;

  /* 🔴 紅色陰影（文字 + 上方線） */
  text-shadow: 2px 2px red;
  box-shadow: 0 -6px 0 red; /* 線的紅色陰影 */
}

/* Heading 2 */
.h2 {
  font-size: 36px;
  font-style: italic;
  border: 3px solid black;
  padding: 10px;
  background: white;
  outline: 6px solid yellow;
  margin: 40px 0;

  /* 🟡 黃色陰影 */
  text-shadow: 2px 2px 0 yellow;
  box-shadow: 6px 6px 0 yellow;
}

/* Heading 3 */
.h3 {
  font-size: 32px;
  text-align: right;
  text-decoration: underline;
}
</style>

</head>

<body>

<div class="h1">This is heading 1</div>

<div class="h2">This is heading 2</div>

<div class="h3">This is heading 3</div>

</body>
</html>
